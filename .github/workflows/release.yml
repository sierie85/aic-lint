name: release

# Push a tag like `v0.1.0` and this builds, tests, packs and publishes the
# tarball as a GitHub release asset — no manual upload, no local gh needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install
      - run: npm test
      - run: npm pack # builds dist/ via the prepack script
      - name: Publish release with tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz --title "$GITHUB_REF_NAME" --generate-notes
